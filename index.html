<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Naufal Mocha Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #1e1e2e;
            --card-bg: rgba(30, 30, 46, 0.7);
            --accent: #f5e0dc; 
            --secondary-accent: #cba6f7; 
            --neon-glow: 0 0 20px rgba(203, 166, 247, 0.15);
            --text-main: #cdd6f4;
            --text-dim: #7f849c;
            --border: #313244;
            --surface: #181825;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            padding: 50px 70px;
            gap: 40px;
            overflow: hidden;
            position: relative;
        }

        #particles-js {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1;
        }

        .timeline-section, .sidebar { position: relative; z-index: 2; }
        .timeline-section { flex: 2.2; display: flex; flex-direction: column; gap: 25px; }

        .header-label {
            font-size: 1.2rem; font-weight: 900; color: var(--secondary-accent);
            text-transform: uppercase; letter-spacing: 8px; margin-bottom: 5px;
        }

        .class-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(15px);
            transition: all 0.4s ease;
        }

        .class-card.active { 
            border-color: var(--secondary-accent);
            box-shadow: var(--neon-glow);
            background: rgba(49, 50, 68, 0.5);
        }

        .live-dot {
            width: 10px; height: 10px; background: var(--secondary-accent);
            border-radius: 50%; display: inline-block; margin-right: 15px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .date-box { font-size: 1.2rem; color: var(--secondary-accent); font-weight: 700; width: 130px; }

        .time-box {
            display: flex; flex-direction: column; width: 220px;
            border-left: 2px solid var(--border); padding-left: 25px;
        }

        .start-time { font-size: 2.5rem; font-weight: 900; }
        .end-time { font-size: 1.3rem; color: var(--text-dim); font-weight: 700; }

        .info-box { flex: 1; text-align: right; }
        .name { font-size: 2.2rem; font-weight: 700; }
        .room { font-size: 1.3rem; color: var(--text-dim); }

        /* Sidebar */
        .sidebar { flex: 1.1; display: flex; flex-direction: column; gap: 25px; }
        
        /* Weather Module */
        .weather-card {
            background: var(--card-bg); border-radius: 30px; padding: 25px 35px;
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .weather-main { display: flex; align-items: center; gap: 20px; }
        .temp-now { font-size: 3.5rem; font-weight: 900; color: #fff; }
        .weather-icon-large { font-size: 3rem; color: var(--accent); }
        
        .forecast { display: flex; gap: 20px; border-left: 1px solid var(--border); padding-left: 25px; }
        .forecast-item { text-align: center; }
        .forecast-time { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }
        .forecast-temp { font-weight: 700; color: var(--secondary-accent); }

        .clock-card {
            background: var(--card-bg); border-radius: 30px; padding: 30px;
            text-align: center; border: 1px solid var(--border);
        }
        #big-clock { font-size: 5rem; font-weight: 900; color: #fff; }
        #big-date { color: var(--accent); font-size: 1rem; font-weight: 700; letter-spacing: 3px; }

        /* Video Module - Size Maintained */
        .video-module {
            background: var(--surface);
            border-radius: 30px;
            border: 1px solid var(--border);
            overflow: hidden;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Fixed 1080p Aspect Ratio */
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="timeline-section">
        <div class="header-label">Terminal / Schedule</div>
        <div id="timeline-root" style="display: flex; flex-direction: column; gap: 15px;"></div>
    </div>

    <div class="sidebar">
        <div class="weather-card">
            <div class="weather-main">
                <i class="ph-fill ph-cloud-sun weather-icon-large"></i>
                <div class="temp-now">28°C</div>
            </div>
            <div class="forecast">
                <div class="forecast-item">
                    <div class="forecast-time">14:00</div>
                    <i class="ph ph-sun"></i>
                    <div class="forecast-temp">30°</div>
                </div>
                <div class="forecast-item">
                    <div class="forecast-time">17:00</div>
                    <i class="ph ph-cloud-rain"></i>
                    <div class="forecast-temp">26°</div>
                </div>
                <div class="forecast-item">
                    <div class="forecast-time">20:00</div>
                    <i class="ph ph-moon"></i>
                    <div class="forecast-temp">24°</div>
                </div>
            </div>
        </div>

        <div class="clock-card">
            <div id="big-clock">00:00</div>
            <div id="big-date">LOADING...</div>
        </div>

        <div class="video-module">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/XmpMqwjDWBc?autoplay=1&mute=1&controls=1&modestbranding=1"></iframe>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const schedule = [
            { d: 1, dayName: 'Senin', s: 'Toefl Esyp', t: '08:00', end: '10:00', r: 'KU1.02.10' },
            { d: 1, dayName: 'Senin', s: 'Kalkulus Lanjut', t: '10:30', end: '12:30', r: 'KU3.09.17' },
            { d: 1, dayName: 'Senin', s: 'Alpro 2', t: '12:30', end: '14:30', r: 'KU3.09.17' },
            { d: 2, dayName: 'Selasa', s: 'Alpro 2 (Lab)', t: '06:30', end: '09:30', r: 'LAB 0617' },
            { d: 2, dayName: 'Selasa', s: 'Arsitektur Komputer', t: '10:30', end: '13:30', r: 'TULT-1509' },
            { d: 2, dayName: 'Selasa', s: 'Kalkulus Lanjut', t: '14:30', end: '16:30', r: 'KU3.09.17' },
            { d: 3, dayName: 'Rabu', s: 'Alpro 2', t: '08:30', end: '10:30', r: 'TULT-1509' },
            { d: 3, dayName: 'Rabu', s: 'Matriks & Ruang Vektor', t: '11:30', end: '14:30', r: 'TULT-1510' },
            { d: 4, dayName: 'Kamis', s: 'Toefl Esyp', t: '08:00', end: '10:00', r: 'KU1.02.10' },
            { d: 4, dayName: 'Kamis', s: 'Etika Dalam AI', t: '14:30', end: '16:30', r: 'TULT-1509' },
            { d: 5, dayName: 'Jumat', s: 'Pemodelan Basis Data', t: '08:30', end: '11:30', r: 'TULT-1509' },
            { d: 5, dayName: 'Jumat', s: 'Bahasa Inggris', t: '14:30', end: '16:30', r: 'TULT-1510' }
        ];

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 30 },
                "color": { "value": "#cba6f7" },
                "opacity": { "value": 0.15 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#cba6f7", "opacity": 0.05 },
                "move": { "enable": true, "speed": 0.4 }
            }
        });

        function updateTimeline() {
            const now = new Date();
            const currentDay = now.getDay();
            const currentTime = now.getHours() * 60 + now.getMinutes();

            let upcoming = schedule.map(item => {
                const [h, m] = item.t.split(':');
                const abs = (item.d * 1440) + (parseInt(h) * 60 + parseInt(m));
                let nowAbs = (currentDay * 1440) + currentTime;
                return { ...item, abs: abs < nowAbs - 120 ? abs + 10080 : abs };
            }).sort((a, b) => a.abs - b.abs);

            const root = document.getElementById('timeline-root');
            root.innerHTML = '';

            upcoming.slice(0, 4).forEach(c => {
                const [h, m] = c.end.split(':');
                const endAbs = (c.d * 1440) + (parseInt(h) * 60 + parseInt(m));
                const isActive = (currentTime + (currentDay * 1440) >= c.abs && currentTime + (currentDay * 1440) <= endAbs);

                root.innerHTML += `
                    <div class="class-card ${isActive ? 'active' : ''}">
                        <div class="date-box">${isActive ? '<span class="live-dot"></span>LIVE' : c.dayName}</div>
                        <div class="time-box">
                            <span class="start-time">${c.t}</span>
                            <span class="end-time">${c.end}</span>
                        </div>
                        <div class="info-box">
                            <div class="name">${c.s}</div>
                            <div class="room">${c.r}</div>
                        </div>
                    </div>`;
            });

            document.getElementById('big-clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('big-date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();
        }

        setInterval(updateTimeline, 10000);
        updateTimeline();
    </script>
</body>
</html>
