<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Naufal Neon Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(10, 10, 10, 0.9);
            --accent: #ff0000;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.7), 0 0 30px rgba(255, 0, 0, 0.3);
            --text-main: #ffffff;
            --text-dim: #666;
            --border: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            padding: 50px 70px;
            gap: 50px;
            overflow: hidden;
            position: relative;
        }

        /* Particle Background */
        #particles-js {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1;
        }

        .timeline-section, .sidebar { position: relative; z-index: 2; }
        .timeline-section { flex: 2.2; display: flex; flex-direction: column; gap: 30px; }

        .header-label {
            font-size: 2rem; font-weight: 900; color: var(--accent);
            text-transform: uppercase; letter-spacing: 6px; margin-bottom: 10px;
            text-shadow: var(--neon-glow);
        }

        .class-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 35px 45px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: all 0.4s ease;
        }

        /* Neon Active Flicker */
        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { border-color: var(--accent); box-shadow: var(--neon-glow); }
            20%, 22%, 24%, 55% { border-color: #330000; box-shadow: none; }
        }

        .class-card.active { animation: neonFlicker 5s infinite; background: rgba(20, 0, 0, 0.4); }

        .live-dot {
            width: 12px; height: 12px; background: var(--accent);
            border-radius: 50%; display: inline-block; margin-right: 15px;
            box-shadow: 0 0 10px var(--accent); animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .date-box { font-size: 1.5rem; color: var(--accent); font-weight: 700; width: 150px; text-transform: uppercase; }

        .time-box {
            display: flex; flex-direction: column; width: 280px;
            border-left: 2px solid var(--border); padding-left: 30px; margin-left: 10px;
        }

        .start-time { font-size: 3.5rem; font-weight: 900; line-height: 1; }
        .end-time { font-size: 1.8rem; color: var(--text-dim); font-weight: 700; margin-top: 5px; }

        .info-box { flex: 1; text-align: right; }
        .name { font-size: 2.8rem; font-weight: 700; margin-bottom: 5px; }
        .room { font-size: 1.8rem; color: var(--text-dim); }

        /* Sidebar Elements */
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 40px; }
        .clock-card {
            background: var(--card-bg); border-radius: 40px; padding: 40px;
            text-align: center; border: 1px solid var(--border);
        }
        #big-clock { font-size: 6rem; font-weight: 900; text-shadow: var(--neon-glow); }
        #big-date { color: var(--accent); font-size: 1.4rem; font-weight: 700; letter-spacing: 2px; }

        .player-card {
            flex: 1; background: #000; border-radius: 40px;
            border: 1px solid var(--border); overflow: hidden;
            position: relative; padding-top: 56.25%; height: 0;
        }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="timeline-section">
        <div class="header-label">TIMELINE</div>
        <div id="timeline-root" style="display: flex; flex-direction: column; gap: 25px;"></div>
    </div>

    <div class="sidebar">
        <div class="clock-card">
            <div id="big-clock">00:00</div>
            <div id="big-date">LOADING...</div>
        </div>
        <div class="player-card">
            <iframe src="https://www.youtube.com/embed/XmpMqwjDWBc?autoplay=1&mute=1&controls=1"></iframe>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const schedule = [
            { d: 1, dayName: 'Senin', s: 'Toefl Esyp', t: '08:00', end: '10:00', r: 'KU1.02.10' },
            { d: 1, dayName: 'Senin', s: 'Kalkulus Lanjut', t: '10:30', end: '12:30', r: 'KU3.09.17' },
            { d: 1, dayName: 'Senin', s: 'Alpro 2', t: '12:30', end: '14:30', r: 'KU3.09.17' },
            { d: 2, dayName: 'Selasa', s: 'Alpro 2 (Lab)', t: '06:30', end: '09:30', r: 'LAB 0617' },
            { d: 2, dayName: 'Selasa', s: 'Arsitektur Komputer', t: '10:30', end: '13:30', r: 'TULT-1509' },
            { d: 2, dayName: 'Selasa', s: 'Kalkulus Lanjut', t: '14:30', end: '16:30', r: 'KU3.09.17' },
            { d: 3, dayName: 'Rabu', s: 'Alpro 2', t: '08:30', end: '10:30', r: 'TULT-1509' },
            { d: 3, dayName: 'Rabu', s: 'Matriks & Ruang Vektor', t: '11:30', end: '14:30', r: 'TULT-1510' },
            { d: 4, dayName: 'Kamis', s: 'Toefl Esyp', t: '08:00', end: '10:00', r: 'KU1.02.10' },
            { d: 4, dayName: 'Kamis', s: 'Etika Dalam AI', t: '14:30', end: '16:30', r: 'TULT-1509' },
            { d: 5, dayName: 'Jumat', s: 'Pemodelan Basis Data', t: '08:30', end: '11:30', r: 'TULT-1509' },
            { d: 5, dayName: 'Jumat', s: 'Bahasa Inggris', t: '14:30', end: '16:30', r: 'TULT-1510' }
        ];

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#ff0000" },
                "opacity": { "value": 0.3 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#ff0000", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });

        function updateTimeline() {
            const now = new Date();
            const currentDay = now.getDay();
            const currentTime = now.getHours() * 60 + now.getMinutes();

            let upcoming = schedule.map(item => {
                const [h, m] = item.t.split(':');
                const abs = (item.d * 1440) + (parseInt(h) * 60 + parseInt(m));
                let nowAbs = (currentDay * 1440) + currentTime;
                return { ...item, abs: abs < nowAbs - 120 ? abs + 10080 : abs };
            }).sort((a, b) => a.abs - b.abs);

            const root = document.getElementById('timeline-root');
            root.innerHTML = '';

            upcoming.slice(0, 4).forEach(c => {
                const [h, m] = c.end.split(':');
                const endAbs = (c.d * 1440) + (parseInt(h) * 60 + parseInt(m));
                const isActive = (currentTime + (currentDay * 1440) >= c.abs && currentTime + (currentDay * 1440) <= endAbs);

                root.innerHTML += `
                    <div class="class-card ${isActive ? 'active' : ''}">
                        <div class="date-box">${isActive ? '<span class="live-dot"></span>LIVE' : c.dayName}</div>
                        <div class="time-box">
                            <span class="start-time">${c.t}</span>
                            <span class="end-time">Until ${c.end}</span>
                        </div>
                        <div class="info-box">
                            <div class="name">${c.s}</div>
                            <div class="room">${c.r}</div>
                        </div>
                    </div>`;
            });

            document.getElementById('big-clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('big-date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();
        }

        setInterval(updateTimeline, 10000);
        updateTimeline();
    </script>
</body>
</html>
